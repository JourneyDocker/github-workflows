name: Docker Publish

on:
  workflow_call:
    inputs:
      tag:
        description: "The tag for the Docker image, e.g., 'latest' or 'main'"
        required: true
        type: string
      platforms:
        description: "The platforms for Docker image build, e.g., 'linux/amd64,linux/arm64'"
        required: true
        type: string
      registry:
        description: "The registry to publish to: 'both', 'dockerhub', or 'github'"
        required: false
        default: 'both'
        type: string
      dockerfile-location:
        description: "The build context directory for the Docker image, relative to the repository root"
        required: false
        default: '.'
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    environment: release-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          show-progress: false
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        if: ${{ inputs.registry == 'both' || inputs.registry == 'github' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: ${{ inputs.registry == 'both' || inputs.registry == 'dockerhub' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ (inputs.registry == 'both' || inputs.registry == 'github') && format('ghcr.io/{0}', github.repository) || '' }}
            ${{ (inputs.registry == 'both' || inputs.registry == 'dockerhub') && format('{0}/{1}', secrets.DOCKERHUB_USERNAME, github.event.repository.name) || '' }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            ${{ inputs.tag != 'main' && format('type=raw,value={0}', github.ref_name) || '' }}
          labels: |
            org.opencontainers.image.version=${{ inputs.tag == 'main' && github.sha || github.ref_name }}

      - name: Build and publish Docker image from Dockerfile
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.dockerfile-location }}
          platforms: ${{ inputs.platforms }}
          provenance: true
          sbom: true
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update DockerHub repository description
        if: ${{ (inputs.registry == 'both' || inputs.registry == 'dockerhub') && inputs.tag == 'main' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ format('{0}/{1}', secrets.DOCKERHUB_USERNAME, github.event.repository.name) }}
          short-description: ${{ github.event.repository.description }}

      - name: Set lowercase repository name
        id: repo-name
        run: |
          echo "IMAGE_NAME_LC=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Delete Untagged Packages
        if: ${{ inputs.registry == 'both' || inputs.registry == 'github' }}
        uses: dataaxiom/ghcr-cleanup-action@v1
        continue-on-error: true
        with:
          delete-untagged: true
          delete-ghost-images: true
          delete-orphaned-images: true
          validate: true
          package: ${{ env.IMAGE_NAME_LC }}
